<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" font-family="Segoe UI,system-ui,sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11131a"/><stop offset="1" stop-color="#1f2a52"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="300" rx="18" fill="url(#g)"/>
  <text x="64" y="120" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="-1">Aneirin</text>
  <text x="66" y="168" fill="#aeb6ff" font-size="30" font-weight="600">Use fewer tokens, losslessly.</text>
  <text x="66" y="212" fill="#c7ccd6" font-size="21">A local optimizer for Claude Code and GitHub Copilot. Same answers, smaller bill.</text>
  <g transform="translate(66,238)">
    <rect width="232" height="34" rx="17" fill="#26305c"/><text x="20" y="23" fill="#dfe3ff" font-size="15" font-weight="600">Local</text><text x="78" y="23" fill="#9aa3c9" font-size="15">No phone-home</text>
    <rect x="248" width="150" height="34" rx="17" fill="#1b3a2a"/><text x="268" y="23" fill="#9be3b8" font-size="15" font-weight="600">Lossless</text>
    <rect x="414" width="210" height="34" rx="17" fill="#26305c"/><text x="434" y="23" fill="#dfe3ff" font-size="15">Reversible in one command</text>
  </g>
  <g transform="translate(980,70)" text-anchor="middle">
    <text x="120" y="0" fill="#7e88b3" font-size="18">tokens removed (in dev)</text>
    <text x="120" y="78" fill="#ffffff" font-size="84" font-weight="800">652M</text>
    <text x="120" y="116" fill="#9be3b8" font-size="18">across 6,699 real requests</text>
  </g>
</svg>